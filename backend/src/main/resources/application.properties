server.port=8082
spring.application.name=backend
#
spring.boot.admin.client.url=http://${ADMIN_SERVER:localhost}:${ADMIN_PORT:8080}
management.endpoints.web.exposure.include=*
#
spring.kafka.bootstrap-servers=${KAFKA_SERVER:localhost}:${KAFKA_PORT:9092}
spring.kafka.producer.properties.max.request.size=3000000
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
spring.kafka.consumer.group-id=backend
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer
#
spring.data.mongodb.database=exchange
spring.data.mongodb.uri=mongodb://${MONGO_DB_SERVER:localhost}:${MONGO_DB_PORT:27017}/exchange
#
backend.recording=false
backend.replay=false