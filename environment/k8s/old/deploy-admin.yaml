kind: Deployment
apiVersion: apps/v1
metadata:
  name: admin
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      containers:
        - image: ghcr.io/buildingsoftwareblocks/exchange-admin
          name: admin
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

---

kind: Service
apiVersion: v1
metadata:
  name: admin
spec:
  selector:
    app: admin
  type: NodePort
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

