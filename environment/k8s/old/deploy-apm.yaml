kind: Deployment
apiVersion: apps/v1
metadata:
  name: apm
  labels:
    app: apm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apm
  template:
    metadata:
      labels:
        app: apm
    spec:
      containers:
        - image: ghcr.io/buildingsoftwareblocks/apm
          name: apm
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APM_SERVICE_PORT
              value: "8080"

---

kind: Service
apiVersion: v1
metadata:
  name: apm
spec:
  selector:
    app: apm
  type: NodePort
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080

